<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChimieLab - Liste des TP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-blue-50 text-slate-800">
    <!-- Header -->
    <header class="bg-blue-700 text-white p-4 shadow-md sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex items-center gap-3">
            <i data-lucide="flask-conical" class="w-7 h-7"></i>
            <h1 class="text-2xl font-bold tracking-tight">ChimieLab</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto p-6">
        <div class="space-y-8">
            <div class="flex items-center justify-between">
                <a href="index.html" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-medium transition-colors">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    Retour à l'accueil
                </a>
                <h2 class="text-3xl font-bold text-blue-900">Liste des TP</h2>
            </div>

            <div class="grid gap-4">
                <!-- TP1 -->
                <a href="tp1.html" class="flex items-center justify-between p-6 bg-white rounded-2xl shadow-sm border border-blue-100 hover:border-blue-300 hover:shadow-md transition-all group">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-pink-100 text-pink-600 rounded-xl group-hover:scale-110 transition-transform">
                            <i data-lucide="flask-conical" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <span class="text-xs font-bold text-pink-600 tracking-wider uppercase">TP1</span>
                            <h3 class="text-xl font-bold text-slate-800">Suivi temporel d’une transformation chimique par spectrophotométrie</h3>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="w-6 h-6 text-slate-300 group-hover:text-blue-600 group-hover:translate-x-1 transition-all"></i>
                </a>

                <!-- TP2 -->
                <a href="tp2.html" class="flex items-center justify-between p-6 bg-white rounded-2xl shadow-sm border border-blue-100 hover:border-blue-300 hover:shadow-md transition-all group">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-cyan-100 text-cyan-600 rounded-xl group-hover:scale-110 transition-transform">
                            <i data-lucide="activity" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <span class="text-xs font-bold text-cyan-600 tracking-wider uppercase">TP2</span>
                            <h3 class="text-xl font-bold text-slate-800">Piles et électrolyse (NaCl + H₂O)</h3>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="w-6 h-6 text-slate-300 group-hover:text-blue-600 group-hover:translate-x-1 transition-all"></i>
                </a>

                <!-- TP3 -->
                <a href="tp3.html" class="flex items-center justify-between p-6 bg-white rounded-2xl shadow-sm border border-blue-100 hover:border-blue-300 hover:shadow-md transition-all group">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-blue-100 text-blue-600 rounded-xl group-hover:scale-110 transition-transform">
                            <i data-lucide="test-tube" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <span class="text-xs font-bold text-blue-600 tracking-wider uppercase">TP3</span>
                            <h3 class="text-xl font-bold text-slate-800">Réaction Chimique</h3>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="w-6 h-6 text-slate-300 group-hover:text-blue-600 group-hover:translate-x-1 transition-all"></i>
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-800 text-slate-300 text-center p-6 mt-12">
        <p>© 2026 Système de préparation et de sécurisation des TP de chimie</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
