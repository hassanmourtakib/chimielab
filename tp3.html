<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChimieLab - TP3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-blue-50 text-slate-800">
    <!-- Header -->
    <header class="bg-blue-700 text-white p-4 shadow-md sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex items-center gap-3">
            <i data-lucide="flask-conical" class="w-7 h-7"></i>
            <h1 class="text-2xl font-bold tracking-tight">ChimieLab</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto p-6">
        <div class="space-y-6 text-center py-20">
            <a href="experiments.html" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-medium transition-colors mb-8">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Retour à la liste des TP
            </a>
            
            <div class="bg-white p-12 rounded-2xl shadow-sm border border-blue-100">
                <i data-lucide="construction" class="w-16 h-16 text-blue-300 mx-auto mb-6"></i>
                <h2 class="text-3xl font-bold text-slate-800 mb-4">TP3 : Réaction Chimique</h2>
                <p class="text-slate-600 text-lg">Ce contenu est en cours de préparation.</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-800 text-slate-300 text-center p-6 mt-12">
        <p>© 2026 Système de préparation et de sécurisation des TP de chimie</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
